# ── Action Tokenizer (LAM) training config ─────────────────────────
# Usage: python scripts/train_action_tokenizer.py --config configs/action_tokenizer.yaml

# ── Data ─────────────────────────────────────────────────────────
dataset: zelda
data_config: configs/data.yaml          # inherits paths, seq_len, etc.

# ── Pretrained Video Tokenizer ───────────────────────────────────
# Must point to a trained Video Tokenizer checkpoint
video_tokenizer_ckpt: checkpoints/video_tokenizer/best.pt
video_tokenizer_config: configs/video_tokenizer.yaml

# ── Model ────────────────────────────────────────────────────────
embed_dim: 32        # Must match Video Tokenizer's embed_dim
num_heads: 8
hidden_dim: 128
num_blocks: 2        # STT layers (LAM can be smaller than Video Tokenizer)
action_dim: 2        # FSQ dimensions per action token
num_bins: 4          # FSQ levels per dimension → action_vocab_size = 4^2 = 16
var_weight: 100.0    # Weight for the auxiliary variance loss
var_target: 0.01     # Target variance threshold for anti-collapse objective

# ── Training ─────────────────────────────────────────────────────
epochs: 100
batch_size: 32       # override data config; reduce if OOM
lr: 3.0e-4
weight_decay: 0.01
grad_clip: 1.0
warmup_steps: 500    # linear warmup before cosine decay

# ── Logging & Checkpointing ─────────────────────────────────────
log_every: 50        # print loss every N steps
save_every: 5        # save checkpoint every N epochs
vis_every: 5         # save reconstruction comparison every N epochs
checkpoint_dir: checkpoints/action_tokenizer
